<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResponseFox</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Code+Pro:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #ddd8d0;
    --text: #1a1714;
    --text-muted: #8a847c;
    --accent: #2d5a8e;
    --accent-light: #e8f0fa;
    --pos: #1a6b3a;
    --pos-bg: #edf7f1;
    --pos-border: #a8d9bb;
    --neg: #8b2020;
    --neg-bg: #fdf0f0;
    --neg-border: #e0aaaa;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: Impact, 'Arial Narrow', sans-serif;
    font-size: 2.1rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }

  header p {
    display: none;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-ghost {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.25); }

  .btn-danger {
    background: rgba(200,50,50,0.25);
    color: white;
    border: 1px solid rgba(255,150,150,0.3);
  }
  .btn-danger:hover { background: rgba(200,50,50,0.4); }

  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 28px 24px 0;
  }

  /* ── Student count controls ── */
  .count-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .count-bar label {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .count-pills {
    display: flex;
    gap: 6px;
  }

  .pill {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.35;
    color: white;
  }

  .pill:hover { opacity: 0.7; transform: scale(1.08); }
  .pill.active { opacity: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }

  .pill-a { background: #2d5a8e; }
  .pill-b { background: #a82020; }
  .pill-c { background: #1a6b3a; }
  .pill-d { background: #9a7d00; }

  /* ── Response colour accents ── */
  .student-header { background: var(--surface2); border-bottom: 1px solid var(--border); }
  .student-num    { background: var(--accent); }

  .student-header.resp-a { background: #e8f0fa; border-bottom-color: #b8d0ee; }
  .student-header.resp-b { background: #faeaea; border-bottom-color: #e8bbbb; }
  .student-header.resp-c { background: #e8f7ee; border-bottom-color: #b0ddc0; }
  .student-header.resp-d { background: #faf5dc; border-bottom-color: #ddd09a; }

  .student-header.resp-a .student-num { background: #2d5a8e; }
  .student-header.resp-b .student-num { background: #a82020; }
  .student-header.resp-c .student-num { background: #1a6b3a; }
  .student-header.resp-d .student-num { background: #9a7d00; }

  /* ── Notes general box ── */
  .notes-general-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .notes-general-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    background: #f0f0f5;
    border-bottom: 1px solid var(--border);
    color: #444;
  }

  .notes-general-textarea {
    width: 100%;
    border: none;
    resize: vertical;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    line-height: 1.65;
    color: var(--text);
    background: var(--surface);
    outline: none;
    min-height: 100px;
  }

  .notes-general-textarea::placeholder { color: #c4bfb8; }

  /* ── Question box ── */
  .question-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .question-box-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: var(--accent);
    color: white;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .question-textarea {
    width: 100%;
    border: none;
    resize: vertical;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.97rem;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface);
    outline: none;
    min-height: 80px;
  }

  .question-textarea::placeholder { color: #c4bfb8; font-weight: 400; }

  /* ── Work comparison grid ── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .students-grid {
    display: grid;
    gap: 14px;
    margin-bottom: 24px;
  }

  .student-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .student-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
  }

  .student-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    color: white;
    font-size: 0.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .student-name-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    outline: none;
    min-width: 0;
  }

  .student-name-input::placeholder { color: var(--text-muted); }

  .work-textarea {
    flex: 1;
    width: 100%;
    border: none;
    resize: vertical;
    padding: 14px;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.82rem;
    line-height: 1.65;
    color: var(--text);
    background: var(--surface);
    outline: none;
    min-height: 180px;
  }

  .work-textarea::placeholder { color: #c4bfb8; }

  /* ── Notes section ── */
  .notes-section {
    display: grid;
    gap: 14px;
    margin-bottom: 20px;
  }

  .notes-group {
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .notes-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .notes-group.positives .notes-group-header {
    background: var(--pos-bg);
    border: 1px solid var(--pos-border);
    border-bottom: none;
    color: var(--pos);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .notes-group.negatives .notes-group-header {
    background: var(--neg-bg);
    border: 1px solid var(--neg-border);
    border-bottom: none;
    color: var(--neg);
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .notes-icon {
    font-size: 1rem;
  }

  .notes-columns {
    display: grid;
    gap: 0;
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }

  .notes-cell {
    border: 1px solid var(--border);
    border-top: none;
    display: flex;
    flex-direction: column;
  }

  .notes-group.positives .notes-cell {
    border-color: var(--pos-border);
  }
  .notes-group.negatives .notes-cell {
    border-color: var(--neg-border);
  }

  .notes-cell:not(:last-child) {
    border-right: none;
  }

  .notes-cell-header {
    padding: 6px 12px;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .notes-group.positives .notes-cell-header {
    border-color: var(--pos-border);
    background: #f4fbf7;
    color: var(--pos);
    opacity: 0.8;
  }

  .notes-group.negatives .notes-cell-header {
    border-color: var(--neg-border);
    background: #fdf6f6;
    color: var(--neg);
    opacity: 0.8;
  }

  .notes-textarea {
    flex: 1;
    width: 100%;
    border: none;
    resize: vertical;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    line-height: 1.6;
    outline: none;
    min-height: 100px;
  }

  .notes-group.positives .notes-textarea {
    background: var(--pos-bg);
    color: #133d24;
  }

  .notes-group.negatives .notes-textarea {
    background: var(--neg-bg);
    color: #5a1010;
  }

  .notes-textarea::placeholder { opacity: 0.45; }

  /* ── Word count badge ── */
  .wc {
    font-size: 0.68rem;
    color: var(--text-muted);
    padding: 4px 14px 6px;
    text-align: right;
  }

  /* ── Export area ── */
  .export-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 20px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary:hover { background: #244d7a; }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    padding: 9px 20px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-outline:hover { background: var(--accent-light); }

  /* ── Sources section ── */
  .sources-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 40px;
  }

  .sources-input-row {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .source-input {
    flex: 1;
    border: none;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  .source-input::placeholder { color: #c4bfb8; }

  .btn-add-source {
    border: none;
    border-left: 1px solid var(--border);
    background: var(--surface2);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    padding: 0 18px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-add-source:hover { background: var(--accent-light); }

  .sources-list {
    list-style: none;
    padding: 0;
  }

  .sources-list:empty { display: none; }

  .source-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    line-height: 1.5;
  }

  .source-item:last-child { border-bottom: none; }

  .source-bullet {
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .source-text {
    flex: 1;
    word-break: break-word;
  }

  .source-remove {
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.95rem;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0.5;
    transition: opacity 0.15s;
  }

  .source-remove:hover { opacity: 1; color: var(--neg); }

  .sources-md-preview {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    position: relative;
  }

  .sources-md-label {
    font-size: 0.68rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .sources-md-preview pre {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .btn-copy-sources {
    position: absolute;
    top: 12px;
    right: 14px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-copy-sources:hover { background: var(--accent-light); border-color: var(--accent); }

  /* ── Print styles ── */
  @media print {
    header { background: #1a1714 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .count-bar, .export-bar, .header-controls { display: none !important; }
    body { padding: 0; }
    .main { padding: 16px; }
    .work-textarea, .notes-textarea { resize: none; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1714;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.83rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <h1>ResponseFox</h1>
  </div>
  <div class="header-controls">
    <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
  </div>
</header>

<div class="main">

  <div class="section-label">Question</div>
  <div class="question-box">
    <div class="question-box-header">❓ Question </div>
    <textarea class="question-textarea" id="questionText" placeholder="Paste the question or prompt here…"></textarea>
  </div>

  <div class="count-bar">
    <label>Responses:</label>
    <div class="count-pills" id="countPills"></div>
  </div>

  <div class="section-label">Responses</div>
  <div class="students-grid" id="studentsGrid"></div>

  <div class="section-label">Marking</div>
  <div class="notes-section" id="notesSection">

    <div class="notes-group positives">
      <div class="notes-group-header">
        <span class="notes-icon">✅</span> Positives
      </div>
      <div class="notes-columns" id="posColumns"></div>
    </div>

    <div class="notes-group negatives">
      <div class="notes-group-header">
        <span class="notes-icon">⚠️</span> Negatives
      </div>
      <div class="notes-columns" id="negColumns"></div>
    </div>

  </div>

  
  <div class="notes-general-box">
    <div class="notes-general-header">📋 Notes</div>
    <textarea class="notes-general-textarea" id="generalNotes" placeholder="Any overall observations, class trends, or reminders…"></textarea>
  </div>

  <div class="section-label">Sources</div>
  <div class="sources-box" id="sourcesBox">
    <div class="sources-input-row">
      <input type="text" id="sourceInput" class="source-input" placeholder="Add a source and press Enter or click Add…">
      <button class="btn-add-source" onclick="addSource()">+ Add</button>
    </div>
    <ul class="sources-list" id="sourcesList"></ul>
    <div class="sources-md-preview" id="sourcesMdPreview" style="display:none">
      <div class="sources-md-label">Markdown output</div>
      <pre id="sourcesMd"></pre>
      <button class="btn-copy-sources" onclick="copySources()">📋 Copy</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>


<script>
  let studentCount = 2;
  const MAX = 4;
  const LABELS = ['A', 'B', 'C', 'D'];
  const PILL_CLASSES = ['pill-a', 'pill-b', 'pill-c', 'pill-d'];
  const RESP_CLASSES = ['resp-a', 'resp-b', 'resp-c', 'resp-d'];

  function buildPills() {
    const container = document.getElementById('countPills');
    container.innerHTML = '';
    for (let i = 0; i < MAX; i++) {
      const b = document.createElement('button');
      b.className = `pill ${PILL_CLASSES[i]}` + (i < studentCount ? ' active' : '');
      b.textContent = LABELS[i];
      b.onclick = () => setCount(i + 1);
      container.appendChild(b);
    }
  }

  function setCount(n) {
    studentCount = n;
    buildPills();
    buildGrid();
  }

  function buildGrid() {
    buildStudents();
    buildNoteColumns('posColumns', 'pos');
    buildNoteColumns('negColumns', 'neg');
    updateGridCols();
  }

  function updateGridCols() {
    const grid = document.getElementById('studentsGrid');
    grid.style.gridTemplateColumns = `repeat(${studentCount}, 1fr)`;
    document.getElementById('posColumns').style.gridTemplateColumns = `repeat(${studentCount}, 1fr)`;
    document.getElementById('negColumns').style.gridTemplateColumns = `repeat(${studentCount}, 1fr)`;
  }

  function buildStudents() {
    const grid = document.getElementById('studentsGrid');
    const oldNames = [...grid.querySelectorAll('.student-name-input')].map(e => e.value);
    const oldWork  = [...grid.querySelectorAll('.work-textarea')].map(e => e.value);
    grid.innerHTML = '';

    for (let i = 0; i < studentCount; i++) {
      const card = document.createElement('div');
      card.className = 'student-card';
      const header = document.createElement('div');
      header.className = `student-header ${RESP_CLASSES[i]}`;
      header.innerHTML = `
        <div class="student-num">${LABELS[i]}</div>
        <input class="student-name-input" placeholder="Response" value="${escHtml(oldNames[i] || '')}">
      `;
      const ta = document.createElement('textarea');
      ta.className = 'work-textarea';
      ta.placeholder = 'Paste or type response here…';
      ta.value = oldWork[i] || '';
      const wc = document.createElement('div');
      wc.className = 'wc';
      wc.id = `wc-s${i}`;
      card.appendChild(header);
      card.appendChild(ta);
      card.appendChild(wc);
      grid.appendChild(card);

      ta.addEventListener('input', () => updateWC(ta, `wc-s${i}`));
      updateWC(ta, `wc-s${i}`);
    }
  }

  function buildNoteColumns(containerId, prefix) {
    const container = document.getElementById(containerId);
    const oldVals = [...container.querySelectorAll('.notes-textarea')].map(e => e.value);
    container.innerHTML = '';

    for (let i = 0; i < studentCount; i++) {
      const cell = document.createElement('div');
      cell.className = 'notes-cell';
      cell.innerHTML = `
        <div class="notes-cell-header" id="${prefix}-label-${i}">${LABELS[i]}</div>
        <textarea class="notes-textarea" placeholder="Notes…">${escHtml(oldVals[i] || '')}</textarea>
      `;
      container.appendChild(cell);
    }

    syncNoteHeaders();
  }

  function syncNoteHeaders() {
    const names = [...document.querySelectorAll('.student-name-input')].map(e => e.value.trim());
    for (let i = 0; i < studentCount; i++) {
      const label = names[i] ? `${LABELS[i]} — ${names[i]}` : LABELS[i];
      const ph = document.getElementById(`pos-label-${i}`);
      const nh = document.getElementById(`neg-label-${i}`);
      if (ph) ph.textContent = label;
      if (nh) nh.textContent = label;
    }
  }

  document.addEventListener('input', e => {
    if (e.target.classList.contains('student-name-input')) syncNoteHeaders();
  });

  function updateWC(ta, id) {
    const words = ta.value.trim() === '' ? 0 : ta.value.trim().split(/\s+/).length;
    const el = document.getElementById(id);
    if (el) el.textContent = words > 0 ? `${words} words` : '';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Sources ──
  let sources = [];

  document.getElementById('sourceInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addSource();
  });

  function addSource() {
    const input = document.getElementById('sourceInput');
    const val = input.value.trim();
    if (!val) return;
    sources.push(val);
    input.value = '';
    renderSources();
  }

  function removeSource(i) {
    sources.splice(i, 1);
    renderSources();
  }

  function renderSources() {
    const list = document.getElementById('sourcesList');
    const preview = document.getElementById('sourcesMdPreview');
    const mdEl = document.getElementById('sourcesMd');

    list.innerHTML = '';
    sources.forEach((s, i) => {
      const li = document.createElement('li');
      li.className = 'source-item';
      li.innerHTML = `
        <span class="source-bullet">*</span>
        <span class="source-text">${escHtml(s)}</span>
        <button class="source-remove" onclick="removeSource(${i})" title="Remove">✕</button>
      `;
      list.appendChild(li);
    });

    if (sources.length > 0) {
      preview.style.display = 'block';
      mdEl.textContent = sources.map(s => `* ${s}`).join('\n');
    } else {
      preview.style.display = 'none';
    }
  }

  function copySources() {
    const md = sources.map(s => `* ${s}`).join('\n');
    navigator.clipboard.writeText(md).then(() => toast('Sources copied!'));
  }

  function clearAll() {
    if (!confirm('Clear everything and start fresh?')) return;
    document.querySelectorAll('textarea, .student-name-input').forEach(e => e.value = '');
    document.querySelectorAll('[id^="wc-s"]').forEach(e => e.textContent = '');
    document.getElementById('questionText').value = '';
    document.getElementById('generalNotes').value = '';
    sources = [];
    renderSources();
    syncNoteHeaders();
    toast('Cleared.');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Init ──
  buildPills();
  buildGrid();
</script>
</body>
</html>
